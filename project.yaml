version: '4.0'

actions:
  # generate_dataset:
  #   run: ehrql:v1 generate-dataset analysis/dataset_definition_patients.py --output output/dataset_patients.csv.gz
  #   outputs:
  #     highly_sensitive:
  #       dataset: output/dataset_patients.csv.gz

  #################################################################
  # Actions defined for checking pregnancy variables

  generate_dataset_preg_2024_11_01:
    run: ehrql:v1 generate-dataset analysis/check_pregnancy_variables/dataset_definition_pregnancy.py --output output/dataset_preg_2024_11_01.csv.gz -- --start_date 2024-11-01
    outputs:
      highly_sensitive:
        dataset: output/dataset_preg_2024_11_01.csv.gz

  generate_dataset_preg_2025_11_01:
    run: ehrql:v1 generate-dataset analysis/check_pregnancy_variables/dataset_definition_pregnancy.py --output output/dataset_preg_2025_11_01.csv.gz -- --start_date 2025-11-01
    outputs:
      highly_sensitive:
        dataset: output/dataset_preg_2025_11_01.csv.gz

  generate_dataset_preg_measures_u16: 
    run: ehrql:v1 generate-measures analysis/check_pregnancy_variables/dataset_definition_pregnancy_measures.py --output output/measures/:csv -- --age_band "<16"
    outputs:
      moderately_sensitive:
        dataset: output/measures/*_u16.csv

  generate_dataset_preg_measures_o65:
    run: ehrql:v1 generate-measures analysis/check_pregnancy_variables/dataset_definition_pregnancy_measures.py --output output/measures/:csv -- --age_band "65+"
    outputs:
      moderately_sensitive:
        dataset: output/measures/*_o65.csv

#analyse_preg_measures:
#   run: python:v2 analysis/check_pregnancy_variables/pregnancy_checks.py --output output/measures/pregnancy_checks.csv --input output/measures/*.csv
#   needs: 
#     [generate_dataset_preg_measures]
#   outputs:
#     moderately_sensitive:
#       dataset: output/measures/*by_year.csv
#       charts: output/measures/*by_year.png

  analyse_preg_measures_agesex:
    run: python:v2 analysis/check_pregnancy_variables/pregnancy_checks_age_sex.py --output output/measures/:csv --input output/measures/*.csv
    needs: 
      [generate_dataset_preg_measures_u16, generate_dataset_preg_measures_o65]
    outputs:
      moderately_sensitive:
        dataset: output/measures/flag_source_*_summary_by_sex.csv
        charts: output/measures/flag_source_*_summary_by_sex.png
        dataset2: output/measures/summary_*.csv
  
  #################################################################
  # Actions for retrieving patient-level data for each specified month AND combine all into one csv.gz for downstream analysis

  # retrieve csv.gz for each specified month
  generate_patient_dataset_2024_02_01:
    run: ehrql:v1 generate-dataset analysis/dataset_definition_patients.py --dummy-tables dummy-folder --output output/dataset_patients_2024-02-01.csv.gz -- --start_date 2024-02-01
    outputs:
      highly_sensitive:
        dataset: output/dataset_patients_2024-02-01.csv.gz
  generate_patient_dataset_2024_03_01:
    run: ehrql:v1 generate-dataset analysis/dataset_definition_patients.py --dummy-tables dummy-folder --output output/dataset_patients_2024-03-01.csv.gz -- --start_date 2024-03-01
    outputs:
      highly_sensitive:
        dataset: output/dataset_patients_2024-03-01.csv.gz

  # combine monthly tables into one csv.gz
  combine_monthly_patient_gz:
    run: python:v2 analysis/preprocess_combine_gz.py --output output/dataset_patients_combined.csv.gz
    needs: [generate_patient_dataset_2024_02_01, generate_patient_dataset_2024_03_01]
    outputs:
      highly_sensitive:
        dataset: output/dataset_patients_combined.csv.gz

  #################################################################
  # patient-level measures for sense checking; not final measures for analysis
  
  # Population structure
  # # local testing with dummy tables
  # generate_patient_measures_population_structure:
  #   run: ehrql:v1 generate-measures analysis/validation/measures_patient_population_structure.py --dummy-tables dummy_tables --output output/patient_measures_population_structure.csv
  #   outputs:
  #     moderately_sensitive:
  #       measure_tables: output/patient_measures_population_structure.csv
  
  generate_patient_measures_population_structure:
    run: ehrql:v1 generate-measures analysis/validation/measures_patient_population_structure.py --output output/patient_measures_population_structure.csv
    outputs:
      moderately_sensitive:
        measure_tables: output/patient_measures_population_structure.csv
  
  process_patient_measures_population_structure:
    run: python:v2 analysis/validation/process_measure_population_structure.py --output output/patient_measures_population_structure_longformat.csv
    needs: [generate_patient_measures_population_structure]
    outputs:
      moderately_sensitive:
        measure_tables: output/patient_measures_population_structure_longformat.csv
  
  # Measures for checking PF eligibility variables; consultation count variables
  # # local testing with dummy tables
  # generate_patient_measures_eligibility:
  #   run: ehrql:v1 generate-measures analysis/validation/measures_patient_eligibility_validation.py --dummy-tables dummy_tables --output output/patient_measures_eligibility_validation.csv
  #   outputs:
  #     moderately_sensitive:
  #       measure_tables: output/patient_measures_eligibility_validation.csv
  
  generate_patient_measures_eligibility:
    run: ehrql:v1 generate-measures analysis/validation/measures_patient_eligibility_validation.py --output output/patient_measures_eligibility_validation.csv
    outputs:
      moderately_sensitive:
        measure_tables: output/patient_measures_eligibility_validation.csv
  
  process_patient_measures_eligibility:
    run: python:v2 analysis/validation/process_measure_eligibility_validation.py --output output/patient_measures_eligibility_validation_ordered.csv
    needs: [generate_patient_measures_eligibility]
    outputs:
      moderately_sensitive:
        measure_tables: output/patient_measures_eligibility_validation_ordered.csv
  

  # Measures for checking consultation count variables
  # # local testing with dummy tables
  # generate_patient_measures_consultation_validation:
  #   run: ehrql:v1 generate-measures analysis/validation/measures_patient_consultations_validation.py --dummy-tables dummy-folder --output output/patient_measures_consultation_validation.csv
  #   outputs:
  #     moderately_sensitive:
  #       measure_tables: output/patient_measures_consultation_validation.csv

  generate_patient_measures_consultation_validation:
    run: ehrql:v1 generate-measures analysis/validation/measures_patient_consultations_validation.py --output output/patient_measures_consultation_validation.csv
    outputs:
      moderately_sensitive:
        measure_tables: output/patient_measures_consultation_validation.csv

  process_patient_measures_consultation_validation:
    run: python:v2 analysis/validation/process_measure_consultation_validation.py --output output/patient_measures_consultation_validation_ordered.csv
    needs: [generate_patient_measures_consultation_validation]
    outputs:
      moderately_sensitive:
        measure_tables: output/patient_measures_consultation_validation_ordered.csv
        summary_tables: output/patient_measures_consultation_validation_summary.csv
        pf_consultation_chart: output/patient_measures_pf_consultations_by_condition.png
        gp_consultation_chart: output/patient_measures_gp_consultation_by_condition.png

  surppress_measure_consultation_validation:
    run: python:v2 analysis/validation/surppress_measure_consultation_validation.py --output output/patient_measures_consultation_validation_summary_release.csv
    needs: [process_patient_measures_consultation_validation]
    outputs:
      moderately_sensitive:
        release_tables: output/patient_measures_consultation_validation_summary_release.csv
        release_pf_consultation_chart: output/patient_measures_pf_consultations_by_condition_release.png
        release_gp_consultation_chart: output/patient_measures_gp_consultation_by_condition_release.png


  # Measures for checking consultation mode variables
  # # local testing with dummy tables
  # generate_patient_measures_consultation_mode:
  #   run: ehrql:v1 generate-measures analysis/validation/measures_patient_consultation_mode.py --dummy-tables dummy-folder --output output/patient_measures_consultation_mode.csv
  #   outputs:
  #     moderately_sensitive:
  #       measure_tables: output/patient_measures_consultation_mode.csv

  generate_patient_measures_consultation_mode:
    run: ehrql:v1 generate-measures analysis/validation/measures_patient_consultation_mode.py --output output/patient_measures_consultation_mode.csv
    outputs:
      moderately_sensitive:
        measure_tables: output/patient_measures_consultation_mode.csv
  
  process_patient_measures_consultation_mode:
    run: python:v2 analysis/validation/process_measure_consultation_mode.py --output output/patient_measures_consultation_mode_ordered.csv
    needs: [generate_patient_measures_consultation_mode]
    outputs:
      moderately_sensitive:
        measure_tables: output/patient_measures_consultation_mode_ordered.csv
        summary_tables: output/patient_measures_consultation_mode_summary.csv
        consultation_mode_chart: output/patient_measures_gp_pf_consultation_by_mode.png

#################################################################
  # Dataset definition and measures for checking snomedcode appearance for PF conditions
  # local testing with dummy tables
  generate_dataset_snomed_count_uti:
    run: ehrql:v1 generate-dataset analysis/validation_snomed/dataset_definition_snomed.py --output output/dataset_patients_snomed_uti.csv.gz -- --start_date 2025-10-01 --condition uti
    outputs:
      highly_sensitive:
        dataset: output/dataset_patients_snomed_uti.csv.gz

  generate_dataset_snomed_count_sinusitis:
    run: ehrql:v1 generate-dataset analysis/validation_snomed/dataset_definition_snomed.py --output output/dataset_patients_snomed_sinusitis.csv.gz -- --start_date 2025-10-01 --condition sinusitis
    outputs:
      highly_sensitive:
        dataset: output/dataset_patients_snomed_sinusitis.csv.gz

  generate_dataset_snomed_count_insectbite:
    run: ehrql:v1 generate-dataset analysis/validation_snomed/dataset_definition_snomed.py --output output/dataset_patients_snomed_insectbite.csv.gz -- --start_date 2025-10-01 --condition insectbite
    outputs:
      highly_sensitive:
        dataset: output/dataset_patients_snomed_insectbite.csv.gz

  generate_dataset_snomed_count_otitismedia:
    run: ehrql:v1 generate-dataset analysis/validation_snomed/dataset_definition_snomed.py --output output/dataset_patients_snomed_otitismedia.csv.gz -- --start_date 2025-10-01 --condition otitismedia
    outputs:
      highly_sensitive:
        dataset: output/dataset_patients_snomed_otitismedia.csv.gz

  generate_dataset_snomed_count_sorethroat:
    run: ehrql:v1 generate-dataset analysis/validation_snomed/dataset_definition_snomed.py --output output/dataset_patients_snomed_sorethroat.csv.gz -- --start_date 2025-10-01 --condition sorethroat
    outputs:
      highly_sensitive:
        dataset: output/dataset_patients_snomed_sorethroat.csv.gz

  generate_dataset_snomed_count_shingles:
    run: ehrql:v1 generate-dataset analysis/validation_snomed/dataset_definition_snomed.py --output output/dataset_patients_snomed_shingles.csv.gz -- --start_date 2025-10-01 --condition shingles
    outputs:
      highly_sensitive:
        dataset: output/dataset_patients_snomed_shingles.csv.gz

  generate_dataset_snomed_count_impetigo:
    run: ehrql:v1 generate-dataset analysis/validation_snomed/dataset_definition_snomed.py --output output/dataset_patients_snomed_impetigo.csv.gz -- --start_date 2025-10-01 --condition impetigo
    outputs:
      highly_sensitive:
        dataset: output/dataset_patients_snomed_impetigo.csv.gz

  process_dataset_snomed_count:
    run: python:v2 analysis/validation_snomed/process.py --output output/snomed_count_summary.csv
    needs: [
      generate_dataset_snomed_count_uti,
      generate_dataset_snomed_count_sinusitis,
      generate_dataset_snomed_count_insectbite,
      generate_dataset_snomed_count_otitismedia,
      generate_dataset_snomed_count_sorethroat,
      generate_dataset_snomed_count_shingles,
      generate_dataset_snomed_count_impetigo,
    ]
    outputs:
      moderately_sensitive:
        output_tables: output/snomed_count_summary.csv
        output_plots: output/snomed_count_top10_all_conditions.png


  #################################################################
  # Actions defined for getting measures and aggregating into practice-level

  # practice-level data step 1: run patient dataset measures 

  # # version for debugging
  # generate_patient_measures_for_practices:
  #   run: ehrql:v1 generate-measures analysis/practice_variables/measures_practice.py --dummy-tables dummy_tables --output output/practice_measures.csv
  #   outputs:
  #     highly_sensitive:
  #       measure_tables: output/practice_measures.csv

  generate_patient_measures_for_practices:
    run: ehrql:v1 generate-measures analysis/practice_variables/measures_practice.py --output output/practice_measures.csv
    outputs:
      highly_sensitive:
        measure_tables: output/practice_measures.csv
  
  # practice-level data step 2: aggregate patient measures to practice-level data
  process_measures_to_practice_dataset:
    run: python:v2 analysis/practice_variables/process_measures_to_practice_dataset.py --output output/practice_level_data.csv
    needs: [generate_patient_measures_for_practices]
    outputs:
      moderately_sensitive:
        practice_level_data: output/practice_level_data.csv
  
  # practice-level data step 3: extract info from practice-level data
  process_practice_dataset_stp:
    run: python:v2 analysis/practice_variables/practice_to_stp.py --output output/practice_summary_by_stp.csv
    needs: [process_measures_to_practice_dataset]
    outputs:
      moderately_sensitive:
        practice_level_data: output/practice_summary_by_stp.csv
  
  process_practice_dataset_region:
    run: python:v2 analysis/practice_variables/practice_to_region.py --output output/practice_summary_by_region.csv
    needs: [process_measures_to_practice_dataset]
    outputs:
      moderately_sensitive:
        practice_level_data: output/practice_summary_by_region.csv
  
  process_practice_size_distribution:
    run: python:v2 analysis/practice_variables/practice_size_distribution.py --output output/practice_size_distribution.png
    needs: [process_measures_to_practice_dataset]
    outputs:
      moderately_sensitive:
        practice_level_plot: output/practice_size_distribution.png

  #################################################################

