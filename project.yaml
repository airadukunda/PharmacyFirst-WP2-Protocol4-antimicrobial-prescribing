version: '4.0'

actions:
  generate_dataset:
    run: ehrql:v1 generate-dataset analysis/dataset_definition.py --output output/dataset.csv.gz
    outputs:
      highly_sensitive:
        dataset: output/dataset.csv.gz

  analysis_objective_1:
    run: python: analysis/Objective_1_analysis.py
    needs: [generate_dataset]
    outputs:
      moderately_sensitive:
        dataset: output/python_obj1_results.csv
        #figure: figures/survival-plot.png  

  run_model:
    run: stata-mp:v1 analysis/Objective_1_analysis.do
    needs: [generate_dataset]
    outputs:
      moderately_sensitive:
        dataset: output/stata_obj1_results.csv
        #figure: figures/survival-plot.png
    

  
